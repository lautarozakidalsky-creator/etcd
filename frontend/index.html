<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦸 Dashboard de Héroes - etcd</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🦸 Dashboard de Héroes</h1>
            <p class="subtitle">Monitoreo en tiempo real desde etcd (Jetson Nano)</p>
            <div class="status" id="status">
                <span class="dot"></span> <span id="status-text">Conectando...</span>
            </div>
        </header>

        <main>
            <div class="info-panel">
                <div class="card">
                    <h3>📊 Total Héroes</h3>
                    <p id="total-heroes" class="big-number">0</p>
                </div>
                <div class="card">
                    <h3>🕐 Última Actualización</h3>
                    <p id="last-update" class="big-number">--:--:--</p>
                </div>
            </div>

            <div class="heroes-grid" id="heroes-grid">
                <!-- Los héroes se insertarán aquí dinámicamente -->
                <div class="loading">Esperando datos...</div>
            </div>
        </main>

        <footer>
            <p>Datos provenientes de etcd en Jetson Nano | Actualización automática cada 2s</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
